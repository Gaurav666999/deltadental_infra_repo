name: Build Push and Deploy using ArgoCD

on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: write

concurrency:
  group: app-deploy-main
  cancel-in-progress: false

jobs:
  build-push-and-deploy:
    name: Build Push and Deploy Application
    runs-on: ubuntu-latest

    env:
      IMAGE_NAME_ADD: add-task
      IMAGE_NAME_UI: micro-ui
      IMAGE_TAG: ${{ github.run_number }}

      ACR_NAME: devtodoacrwestus
      ACR_LOGIN_SERVER: devtodoacrwestus.azurecr.io

      MANIFEST_FILE: app/manifest/deployment.yaml

    steps:
      # ==================================================
      # 1. Checkout Source Code
      # ==================================================
      - name: Checkout Source Code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      # ==================================================
      # 2. Azure Login Using OIDC
      # ==================================================
      - name: Azure Login Using OIDC
        uses: azure/login@v2
        with:
          client-id: 6c2702c6-118e-4640-aba9-86e61333ba0d
          tenant-id: 1658eae6-9066-4c87-8f0e-22a840432c57
          subscription-id: 20cadb7c-62d8-4c57-9b49-63ebd307c63e

      # ==================================================
      # 3. Verify Azure Login
      # ==================================================
      - name: Verify Azure Login
        run: |
          az account show --output table

      # ==================================================
      # 4. Login to Azure Container Registry
      # ==================================================
      - name: Login to Azure Container Registry
        run: |
          az acr login --name $ACR_NAME

      # ==================================================
      # 5. Build Add Service Docker Image
      # ==================================================
      - name: Build Add Service Docker Image
        run: |
          docker build \
            -t $ACR_LOGIN_SERVER/$IMAGE_NAME_ADD:$IMAGE_TAG \
            -f app/Add/Dockerfile app

      # ==================================================
      # 6. Show Add Service Docker Image
      # ==================================================
      - name: Show Add Service Docker Image
        run: |
          docker images | grep $IMAGE_NAME_ADD || true

      # ==================================================
      # 7. Trivy Scan Add Service Image Using Docker
      # ==================================================
      - name: Trivy Scan Add Service Image
        run: |
          docker run --rm \
            -v /var/run/docker.sock:/var/run/docker.sock \
            aquasec/trivy:0.65.0 image \
            --severity HIGH,CRITICAL \
            --format table \
            --exit-code 0 \
            $ACR_LOGIN_SERVER/$IMAGE_NAME_ADD:$IMAGE_TAG

      # ==================================================
      # 8. Push Add Service Image to ACR
      # ==================================================
      - name: Push Add Service Image to ACR
        run: |
          docker push $ACR_LOGIN_SERVER/$IMAGE_NAME_ADD:$IMAGE_TAG

      # ==================================================
      # 9. Build Micro UI Docker Image
      # ==================================================
      - name: Build Micro UI Docker Image
        run: |
          docker build \
            -t $ACR_LOGIN_SERVER/$IMAGE_NAME_UI:$IMAGE_TAG \
            -f app/Micro/Dockerfile app/Micro

      # ==================================================
      # 10. Show Micro UI Docker Image
      # ==================================================
      - name: Show Micro UI Docker Image
        run: |
          docker images | grep $IMAGE_NAME_UI || true

      # ==================================================
      # 11. Trivy Scan Micro UI Image Using Docker
      # ==================================================
      - name: Trivy Scan Micro UI Image
        run: |
          docker run --rm \
            -v /var/run/docker.sock:/var/run/docker.sock \
            aquasec/trivy:0.65.0 image \
            --severity HIGH,CRITICAL \
            --format table \
            --exit-code 0 \
            $ACR_LOGIN_SERVER/$IMAGE_NAME_UI:$IMAGE_TAG

      # ==================================================
      # 12. Push Micro UI Image to ACR
      # ==================================================
      - name: Push Micro UI Image to ACR
        run: |
          docker push $ACR_LOGIN_SERVER/$IMAGE_NAME_UI:$IMAGE_TAG

      # ==================================================
      # 13. Verify Images in ACR
      # ==================================================
      - name: Verify Images in ACR
        run: |
          echo "Checking repositories in ACR..."
          az acr repository list --name $ACR_NAME --output table

          echo "Checking Add Service tags..."
          az acr repository show-tags \
            --name $ACR_NAME \
            --repository $IMAGE_NAME_ADD \
            --output table || true

          echo "Checking Micro UI tags..."
          az acr repository show-tags \
            --name $ACR_NAME \
            --repository $IMAGE_NAME_UI \
            --output table || true

      # ==================================================
      # 14. Update Add Service Image Tag in Kubernetes Manifest
      # ==================================================
      - name: Update Add Service Image Tag in Manifest
        run: |
          sed -i "s|image:.*add-task.*|image: $ACR_LOGIN_SERVER/$IMAGE_NAME_ADD:$IMAGE_TAG|g" $MANIFEST_FILE

      # ==================================================
      # 15. Update Micro UI Image Tag in Kubernetes Manifest
      # ==================================================
      - name: Update Micro UI Image Tag in Manifest
        run: |
          sed -i "s|image:.*micro-ui.*|image: $ACR_LOGIN_SERVER/$IMAGE_NAME_UI:$IMAGE_TAG|g" $MANIFEST_FILE || true

      # ==================================================
      # 16. Show Updated Kubernetes Manifest
      # ==================================================
      - name: Show Updated Kubernetes Manifest
        run: |
          cat $MANIFEST_FILE

      # ==================================================
      # 17. Check Manifest Changes
      # ==================================================
      - name: Check Manifest Changes
        run: |
          git status
          git diff -- $MANIFEST_FILE || true

      # ==================================================
      # 18. Configure Git User
      # ==================================================
      - name: Configure Git User
        run: |
          git config --global user.email "github-actions@github.com"
          git config --global user.name "github-actions"

      # ==================================================
      # 19. Commit Updated Kubernetes Manifest
      # ==================================================
      - name: Commit Updated Kubernetes Manifest
        run: |
          git add $MANIFEST_FILE
          git commit -m "Update application image tag to $IMAGE_TAG" || echo "No manifest changes to commit"

      # ==================================================
      # 20. Push Updated Manifest to Main Branch
      # ==================================================
      - name: Push Updated Manifest to Main Branch
        run: |
          git push origin HEAD:main

      # ==================================================
      # 21. Deployment Summary
      # ==================================================
      - name: Deployment Summary
        run: |
          echo "Application pipeline completed successfully"
          echo "Add Service Image: $ACR_LOGIN_SERVER/$IMAGE_NAME_ADD:$IMAGE_TAG"
          echo "Micro UI Image: $ACR_LOGIN_SERVER/$IMAGE_NAME_UI:$IMAGE_TAG"
          echo "Manifest updated: $MANIFEST_FILE"
          echo "ArgoCD will sync automatically from Git"
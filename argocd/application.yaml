apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: todo-app
  namespace: argocd

spec:
  project: default

  source:
    repoURL: https://github.com/Gaurav666999/deltadental_infra_repo
    targetRevision: HEAD
    path: app/manifest   # 👈 adjust karna hai

  destination:
    server: https://kubernetes.default.svc
    namespace: argocd1

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
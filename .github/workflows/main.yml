name: Build and Push to ACR

on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    env:
      IMAGE_NAME: add-task
      IMAGE_TAG: v0
      IMAGE_NAME1: micro-ui
      IMAGE_TAG1: v0
      ACR_NAME: devtodoacrwestus
      ACR_LOGIN_SERVER: devtodoacrwestus.azurecr.io

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Azure Login
        uses: Azure/login@v2
        with:
          client-id: 6c2702c6-118e-4640-aba9-86e61333ba0d
          tenant-id: 1658eae6-9066-4c87-8f0e-22a840432c57
          subscription-id: 20cadb7c-62d8-4c57-9b49-63ebd307c63e

      - name: Login to ACR
        run: |
          az acr login --name $ACR_NAME

      # 🔥 ADD SERVICE (FIXED)
      - name: Build Add Image
        run: |
          docker build -t $IMAGE_NAME:$IMAGE_TAG -f app/Add/Dockerfile app

      - name: Tag Add Image
        run: |
          docker tag $IMAGE_NAME:$IMAGE_TAG $ACR_LOGIN_SERVER/$IMAGE_NAME:$IMAGE_TAG

      - name: Push Add Image
        run: |
          docker push $ACR_LOGIN_SERVER/$IMAGE_NAME:$IMAGE_TAG

      # 🔥 MICRO SERVICE
      - name: Build Micro Image
        run: |
          docker build -t $IMAGE_NAME1:$IMAGE_TAG1 ./app/Micro

      - name: Tag Micro Image
        run: |
          docker tag $IMAGE_NAME1:$IMAGE_TAG1 $ACR_LOGIN_SERVER/$IMAGE_NAME1:$IMAGE_TAG1

      - name: Push Micro Image
        run: |
          docker push $ACR_LOGIN_SERVER/$IMAGE_NAME1:$IMAGE_TAG1

      # 🚀 DEPLOY
      - name: Deploy to AKS
        run: |
          az aks command invoke \
            --resource-group psddg \
            --name devtodoakswestus \
            --command "kubectl apply -f manifest/deployment.yaml && kubectl apply -f manifest/service.yaml" \
            --file manifest/deployment.yaml \
            --file manifest/service.yaml
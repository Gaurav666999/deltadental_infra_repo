name: Infra Validation + AKS Connectivity

on:
  push:
    branches:
      - main
    paths-ignore:
      - 'app/manifest/**'

  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  infra-validation:
    runs-on: ubuntu-latest

    env:
      RESOURCE_GROUP: psddg
      AKS_NAME: devtodoakswestus
      ACR_NAME: devtodoacrwestus

    steps:
      # Checkout Repository
      - name: Checkout Code
        uses: actions/checkout@v4

      # Azure Login (OIDC)
      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: 6c2702c6-118e-4640-aba9-86e61333ba0d
          tenant-id: 1658eae6-9066-4c87-8f0e-22a840432c57
          subscription-id: 20cadb7c-62d8-4c57-9b49-63ebd307c63e

      # Setup OpenTofu
      - name: Setup OpenTofu
        uses: opentofu/setup-opentofu@v1

      # Format Check
      - name: OpenTofu Format Check
        working-directory: environments/dev
        run: tofu fmt -check -recursive

      # Initialize
      - name: OpenTofu Init
        working-directory: environments/dev
        run: tofu init -input=false

      # Validate
      - name: OpenTofu Validate
        working-directory: environments/dev
        run: tofu validate

      # Checkov Security Scan
      - name: Run Checkov
        uses: bridgecrewio/checkov-action@master
        with:
          directory: environments/dev
          framework: terraform
          soft_fail: true
          output_format: cli

      # tfsec Security Scan
      - name: Run tfsec
        uses: aquasecurity/tfsec-action@v1.0.3
        with:
          working_directory: environments/dev

      # Plan
      - name: OpenTofu Plan
        working-directory: environments/dev
        run: tofu plan -input=false

      # Login to Azure Container Registry
      - name: Login to Azure Container Registry
        run: az acr login --name $ACR_NAME

      # Install kubectl
      - name: Install kubectl
        run: az aks install-cli

      # Get AKS Credentials
      - name: Get AKS Credentials
        run: |
          az aks get-credentials \
            --resource-group $RESOURCE_GROUP \
            --name $AKS_NAME \
            --overwrite-existing

      # Verify AKS Connectivity
      - name: Verify AKS Connectivity
        run: |
          kubectl get nodes
          kubectl get pods -A
          kubectl get svc -A

      # Disabled for Safety

name: Infra Validation + AKS Connectivity # just adding a comment for de

on:
  push:
    branches:
      - main

    paths-ignore:
      - 'app/manifest/**'

  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  infra-validation:
    runs-on: ubuntu-latest

    env:
      RESOURCE_GROUP: psddg
      AKS_NAME: devtodoakswestus
      ACR_NAME: devtodoacrwestus

    steps:
      # ✅ Checkout Code
      - name: Checkout Code
        uses: actions/checkout@v4

      # ✅ Azure Login
      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: 6c2702c6-118e-4640-aba9-86e61333ba0d
          tenant-id: 1658eae6-9066-4c87-8f0e-22a840432c57
          subscription-id: 20cadb7c-62d8-4c57-9b49-63ebd307c63e

      # ✅ Setup Terraform
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      # Fix main.tf variable mapping
      - name: Fix main.tf variable mapping
        run: |
          sed -i 's/servers_dbs = var.servers_dbs/server_dbs = var.servers_dbs/g' environments/dev/main.tf
          sed -i 's/server_dbs = var.server_dbs/server_dbs = var.servers_dbs/g' environments/dev/main.tf

      # Fix module variable usage
      - name: Fix module variable mismatch
        run: |
          sed -i 's/servers_dbs/server_dbs/g' modules/azurerm_Database/main.tf

      # Fix providers.tf garbage text
      - name: Fix providers syntax issue
        run: |
          sed -i '/^[[:space:]]*ld[[:space:]]*$/d' environments/dev/providers.tf

      - name: Terraform Init
        working-directory: environments/dev
        run: terraform init

      - name: Terraform Validate
        working-directory: environments/dev
        run: terraform validate

      - name: Terraform Plan
        working-directory: environments/dev
        run: terraform plan

      - name: Login to ACR
        run: az acr login --name $ACR_NAME

      - name: Install kubectl
        run: az aks install-cli

      - name: Get AKS Credentials
        run: |
          az aks get-credentials \
            --resource-group $RESOURCE_GROUP \
            --name $AKS_NAME \
            --overwrite-existing

      - name: Verify AKS Connectivity
        run: |
          kubectl get nodes
          kubectl get pods -A
          kubectl get svc -A

      # Disabled for safety

      # - name: Terraform Apply
      #   working-directory: environments/dev
      #   run: terraform apply -auto-approve

      # - name: Deploy to AKS
      #   run: kubectl apply -f app/manifest/

      